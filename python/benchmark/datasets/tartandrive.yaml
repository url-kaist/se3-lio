# TartanDrive 2.0 — off-road ATV. LiDAR=Velodyne VLP-32C (build -DLIDAR_TYPE=velodyne; per-point `time`
# relative to scan end, auto-dispatched in ros1bag.py). IMU=Novatel SPAN. Extrinsic in config/tartandrive.yaml
# (vehicle==velodyne_1 -> identity rotation). GT = each bag's /odometry/filtered_odom (UTM), pre-extracted to
# gt.tum next to the bag in the dataset dir (/ws/data/tartan-drive/<seq>/gt.tum).
#
# Bags used here are the CONVERTED single .bag per sequence (uncompressed + indexed -> realtime ROS1 OK).
# Do NOT use the raw split `*_orig.bag` under raw_bags/ (afternoon_fall) — unused.
# Mount the tartan-drive dataset root at /ws/data/tartan-drive. Keys = <course><date>.
#
# ROS1 ATE (1x realtime, this config): gupta0914 1.57m / gupta1114 1.82m / turnpikeflat 7.87m.

tartandrive_gupta0914: {bag: /ws/data/tartan-drive/gupta_2023-09-14-11-12-19/gupta_2023-09-14-11-12-19.bag, input_type: ros1-ouster, base_params: config/tartandrive.yaml, imu_topic: /novatel/imu/data, lidar_topic: /velodyne_1/velodyne_points, gt_tum: /ws/data/tartan-drive/gupta_2023-09-14-11-12-19/gt.tum, max_frames: 4344}
tartandrive_gupta1114: {bag: /ws/data/tartan-drive/2023-11-14-14-52-22_gupta/2023-11-14-14-52-22_gupta.bag, input_type: ros1-ouster, base_params: config/tartandrive.yaml, imu_topic: /novatel/imu/data, lidar_topic: /velodyne_1/velodyne_points, gt_tum: /ws/data/tartan-drive/2023-11-14-14-52-22_gupta/gt.tum, max_frames: 3338}
tartandrive_turnpikeflat: {bag: /ws/data/tartan-drive/turnpike_flat_2023-09-12-13-42-26/turnpike_flat_2023-09-12-13-42-26.bag, input_type: ros1-ouster, base_params: config/tartandrive.yaml, imu_topic: /novatel/imu/data, lidar_topic: /velodyne_1/velodyne_points, gt_tum: /ws/data/tartan-drive/turnpike_flat_2023-09-12-13-42-26/gt.tum, max_frames: 4623}

# turnpike0913 is borderline-unstable (run-to-run ~22m .. diverge); included on request — expect a
# high/variable ATE that inflates the suite mean (single-thread build makes it more reproducible).
tartandrive_turnpike0913: {bag: /ws/data/tartan-drive/turnpike_2023-09-13-18-15-03/turnpike_2023-09-13-18-15-03.bag, input_type: ros1-ouster, base_params: config/tartandrive.yaml, imu_topic: /novatel/imu/data, lidar_topic: /velodyne_1/velodyne_points, gt_tum: /ws/data/tartan-drive/turnpike_2023-09-13-18-15-03/gt.tum, max_frames: 2272}
