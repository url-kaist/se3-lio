# Dataset registry template. Copy to benchmark/datasets.yaml (private, gitignored)
# and fill in real paths. Each top-level key is a bag, selectable on the CLI or
# listed in a suite sweep's `datasets:`.
#
# For a multi-bag suite, add one entry per bag. NTU VIRAL bags share the same
# sensor rig, so base_params/topics are identical and only bag/gt_tum differ.
# GT must be a TUM file with timestamps in SECONDS (NTU poses.txt is nanoseconds
# -> convert with t_ns/1e9 before registering).
#
#   python -m se3_lio.benchmark.run eee_01 --verify-only   # single-bag gate
#   python -m se3_lio.benchmark.run ntu_suite               # suite (see sweeps/)
eee_01:
  bag: /ws/data/eee_01/eee_01.bag
  input_type: ros1-ouster
  base_params: pipelines/ros1/config/ntu.yaml
  imu_topic: /imu/imu
  lidar_topic: /os1_cloud_node1/points
  gt_tum: benchmark/data/eee_01_gt.tum
  max_frames: 800

nya_01:
  bag: /ws/data/nya_01/nya_01.bag
  input_type: ros1-ouster
  base_params: pipelines/ros1/config/ntu.yaml
  imu_topic: /imu/imu
  lidar_topic: /os1_cloud_node1/points
  gt_tum: benchmark/data/nya_01_gt.tum
  max_frames: 800
