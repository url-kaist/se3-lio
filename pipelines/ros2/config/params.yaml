/**:
  ros__parameters:
    imu_topic: "/robot1/sensors/imu/data"
    lidar_topic: "/robot1/sensors/livox/lidar_192_168_1_175"

    sensors:
      imu:
        acc_cov: 0.1
        gyr_cov: 0.1
        b_acc_cov: 0.0001
        b_gyr_cov: 0.0001

      lidar:
        min_range: 0.25
        max_range: 100000
        ranging_covs: [0.02]
        angle_covs: [0.15]

      # [quat : w, x, y, z]
      t_exts: [-0.000411,-0.016735, 0.108357]
      q_exts: [0.9996526, 0.0092866, -0.0099153, -0.0225877]

    downsample:
      resolution: 0.5

    max_iter: 4

    voxel_map:
      resolution: 1.0
      max_layer: 2
      layer_size: [5, 5, 5, 5, 5]
      max_point_size: 1000
      plane_threshold: 0.01