imu_topic: "/alphasense_driver_ros/imu"
lidar_topic: "/hesai/pandar"

sensors:
  imu:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001

  lidar:
    min_range: 0.25
    range_cov: 0.02
    angle_cov: 0.1

  # [quat : w, x, y, z] — Alphasense IMU -> Hesai LiDAR (from calibration/cam-lidar-imu.yaml)
  t_exts: [-0.000652, -0.015510, 0.084633]
  q_exts: [0.701199, -0.000645, 0.001879, 0.712962]

downsample:
  resolution: 1.0

max_iter: 4

voxel_map:
  resolution: 1.0
  max_layer: 2
  layer_size: [5, 5, 5, 5, 5]
  max_point_size: 1000
  plane_threshold: 0.05

  map_sliding_en: true
  sliding_thresh: 8.0
  half_map_size: 50
